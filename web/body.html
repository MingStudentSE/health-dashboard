<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>身体数据页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="page-shell">
      <section class="hero-panel">
        <div class="hero-copy">
          <p class="eyebrow">身体数据页</p>
          <h1>记录体成分、三围和每次变化</h1>
          <p class="hero-text">
            这页专门记录体重、体脂、骨骼肌和三围。每次保存后都会自动生成一段本次分析，并把关键指标的变化趋势画出来。
          </p>
          <div class="page-actions">
            <a class="soft-button" href="./index.html">返回首页</a>
          </div>
        </div>
        <div class="hero-stats" id="body-hero-stats"></div>
      </section>

      <section class="body-layout">
        <article class="body-form-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">录入</p>
              <h2>新增或更新一次记录</h2>
            </div>
          </div>
          <p class="section-subnote">
            以日期为主键。同一天再次保存会覆盖原来的那一条，适合你测完一次后回填完整数值。
          </p>
          <form id="body-record-form" class="form-grid">
            <div class="form-field">
              <label for="record-date">日期</label>
              <input id="record-date" name="date" type="date" required />
            </div>
            <div class="form-field">
              <label for="record-weight">体重</label>
              <input id="record-weight" name="weight" type="number" step="0.1" placeholder="kg" />
            </div>
            <div class="form-field">
              <label for="record-body-fat-rate">体脂率</label>
              <input id="record-body-fat-rate" name="bodyFatRate" type="number" step="0.1" placeholder="%" />
            </div>
            <div class="form-field">
              <label for="record-skeletal-muscle">骨骼肌</label>
              <input id="record-skeletal-muscle" name="skeletalMuscle" type="number" step="0.1" placeholder="kg" />
            </div>
            <div class="form-field">
              <label for="record-chest">胸围</label>
              <input id="record-chest" name="chest" type="number" step="0.1" placeholder="cm" />
            </div>
            <div class="form-field">
              <label for="record-waist">腰围</label>
              <input id="record-waist" name="waist" type="number" step="0.1" placeholder="cm" />
            </div>
            <div class="form-field">
              <label for="record-hip">臀围</label>
              <input id="record-hip" name="hip" type="number" step="0.1" placeholder="cm" />
            </div>
            <div class="form-field">
              <label for="record-body-age">身体年龄</label>
              <input id="record-body-age" name="bodyAge" type="number" step="0.1" placeholder="岁" />
            </div>
            <div class="form-field">
              <label for="record-score">评分</label>
              <input id="record-score" name="score" type="number" step="1" placeholder="/100" />
            </div>
            <div class="form-field span-2">
              <label for="record-note">备注</label>
              <textarea id="record-note" name="note" placeholder="记录这次测量的背景，比如饭后、晨起、在健身房体测仪上测得。"></textarea>
            </div>
          </form>
          <div class="page-actions">
            <button class="solid-button" id="save-record-button" type="submit" form="body-record-form">保存记录</button>
            <button class="soft-button" id="reset-record-button" type="button">清空表单</button>
          </div>
          <p class="field-hint" id="form-status">本页需要本地服务模式才能保存记录。</p>
        </article>

        <article class="body-history-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">摘要</p>
              <h2>最近身体判断</h2>
            </div>
          </div>
          <div class="insight-list" id="body-summary-list"></div>
          <div class="insight-list" id="body-recommendation-list"></div>
        </article>
      </section>

      <section class="paper-panel">
        <div class="section-head">
          <div>
            <p class="section-kicker">趋势</p>
            <h2>关键指标变化</h2>
          </div>
        </div>
        <div class="chart-grid" id="body-trend-grid"></div>
      </section>

      <section class="paper-panel">
        <div class="section-head">
          <div>
            <p class="section-kicker">历史记录</p>
            <h2>每次数据与单次分析</h2>
          </div>
        </div>
        <div class="body-history-list" id="body-history-list"></div>
      </section>
    </main>

    <script type="module" src="./body.js"></script>
  </body>
</html>
